name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || echo "No tests yet — skipping"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/competitor-intel

            echo "Pulling latest code..."
            git pull origin main

            echo "Writing .env..."
            cat > .env << 'ENVEOF'
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
            REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}
            REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}
            REDDIT_USER_AGENT=CompetitorIntelBot/1.0
            META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
            ALERT_EMAIL_FROM=${{ secrets.ALERT_EMAIL_FROM }}
            ALERT_EMAIL_TO=${{ secrets.ALERT_EMAIL_TO }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            GRAFANA_SECRET_KEY=${{ secrets.GRAFANA_SECRET_KEY }}
            APP_ENV=production
            ENVEOF

            echo "Rebuilding containers..."
            docker compose pull
            docker compose build --no-cache api
            docker compose up -d --remove-orphans

            echo "Waiting for health check..."
            sleep 15
            curl -f http://localhost:8000/health || exit 1

            echo "Deployment successful!"
            docker compose ps
