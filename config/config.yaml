app:
  name: "Competitor Intelligence Agent"
  version: "2.0.0"
  poll_interval_minutes: 30
  timezone: "Asia/Kolkata"
  ads_window_days: 30

competitors:
  - name: "OpenAI"
    rss_feeds:
      - "https://openai.com/blog/rss.xml"
    youtube_channel_id: "UCXZCJLdBC09xxGZ6gcdrc6A"
    reddit_rss:
      - "https://www.reddit.com/r/OpenAI/.rss"
      - "https://www.reddit.com/r/ChatGPT/.rss"
    meta_ad_queries:
      - "OpenAI"
      - "ChatGPT"
    meta_fb_page_id: "434609730060978"
    meta_ad_country: "IN"
    serp_queries:
      - "OpenAI news"
      - "ChatGPT update"
      - "OpenAI product launch"

