apis:
  groq:
    model: "llama-3.1-8b-instant"
    max_tokens: 1024
    temperature: 0.1
  youtube:
    max_results: 10
  reddit:
    use_rss: true
  serpapi:
    enabled: true
    keywords_per_competitor: 5

alerts:
  email:
    enabled: true
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
  slack:
    enabled: false
  triggers:
    new_blog_post: true
    new_youtube_video: true
    new_reddit_mention_threshold: 5
    new_ad_detected: true
    sentiment_drop_threshold: -0.3
    serp_min_trend_score: 0.5

mlflow:
  experiment_name: "competitor-intelligence"
  log_every_run: true
  metrics_to_log:
    - "blog_posts_found"
    - "youtube_videos_found"
    - "reddit_mentions"
    - "avg_sentiment"
    - "ads_found"
    - "serp_results_found"
    - "agent_latency_ms"
    - "total_tokens_used"

evaluation:
  enabled: true
  run_every_n_polls: 6

database:
  url: "sqlite:///./data/competitor.db"

logging:
  level: "INFO"
