events { worker_connections 1024; }

http {
    upstream api       { server api:8000; }
    upstream streamlit { server streamlit:8501; }
    upstream grafana   { server grafana:3000; }

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # ── HTTP — redirect to HTTPS if SSL cert present, else serve direct ──────
    server {
        listen 80;
        server_name _;

        # Uncomment after running: sudo certbot certonly --standalone -d yourdomain.com
        # return 301 https://$host$request_uri;

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://api;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/(health|docs|metrics|openapi.json) {
            proxy_pass http://api;
        }

        location /grafana/ {
            rewrite ^/grafana/(.*) /$1 break;
            proxy_pass       http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Streamlit — needs WebSocket support for live updates
        location / {
            proxy_pass         http://streamlit;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }
    }

    # ── HTTPS (uncomment after getting SSL cert) ─────────────────────────────
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
